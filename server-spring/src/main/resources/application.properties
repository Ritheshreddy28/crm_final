# =============================================================================
# Payment reminder server (Spring Boot) — how the frontend connects
# =============================================================================
# The React app sets VITE_REMINDER_API_URL to this server's origin only, e.g.:
#   http://localhost:3001   or   https://your-java-host.example.com
# Then it POSTs to:
#   {origin}/api/send-reminders
#   {origin}/api/send-reminder-to-student
# Paths are defined in Java: com.reminder.web.ReminderApiPaths
# =============================================================================

server.port=${PORT:3001}

# Daily at 09:00 server time (Spring: second minute hour day month weekday)
reminder.cron=${REMINDER_CRON:0 0 9 * * ?}

# Supabase — same env names as server/.env and Node; anon key validates JWTs; service role for RPC
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}

# Gmail SMTP (reminder emails)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${GMAIL_USER:}
spring.mail.password=${GMAIL_APP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.application.name=payment-reminder-server
